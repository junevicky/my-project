<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-card">
        <h1>💰 Tip Calculator</h1>
        <p class="subtitle">Quick & easy bill splitting</p>

        <div class="input-group">
            <label>Bill Amount ($)</label>
            <input type="number" id="billAmount" value="50" step="any">
        </div>

        <div class="input-group">
            <label>Tip %</label>
            <div class="tip-buttons">
                <button class="tip-btn" data-tip="10">10%</button>
                <button class="tip-btn" data-tip="15">15%</button>
                <button class="tip-btn active" data-tip="18">18%</button>
                <button class="tip-btn" data-tip="20">20%</button>
                <button class="tip-btn" data-tip="25">25%</button>
            </div>
            <div class="custom-tip">
                <input type="number" id="customTip" placeholder="Custom %">
            </div>
        </div>

        <div class="input-group">
            <label>Number of People</label>
            <div class="people-control">
                <button id="decrementPeople">-</button>
                <input type="number" id="peopleCount" value="2" min="1">
                <button id="incrementPeople">+</button>
            </div>
        </div>

        <div class="results">
            <div class="result-item">
                <span>💵 Tip per person</span>
                <span class="result-value" id="tipAmount">$0.00</span>
            </div>
            <div class="result-item">
                <span>👥 Total per person</span>
                <span class="result-value" id="totalPerPerson">$0.00</span>
            </div>
            <div class="result-item total-bill">
                <span>💰 Total bill (with tip)</span>
                <span class="result-value" id="totalBill">$0.00</span>
            </div>
        </div>

        <button id="resetBtn" class="reset-btn">Reset</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
